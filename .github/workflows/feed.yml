name: Build news feed

on:
  schedule:
    - cron: "0 6 * * *"      # daily at 06:00 UTC
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed so the job can commit feed.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install firecrawl-py

      - name: Build feed
        run: python build_feed.py
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add feed.json
          git diff --staged --quiet || git commit -m "Update feed $(date -u +%Y-%m-%d)"
          git push